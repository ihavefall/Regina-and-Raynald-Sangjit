<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raynald & Regina - Wedding Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- COLOR PALETTE --- */
        :root {
            --maroon-deep: #5D0016;
            --maroon-rich: #800020;
            --cream-ivory: #F9F6F0;
            --gold-shimmer: #C9A962;
            --gold-light: #E8D9B5;
            --red-bright: #C41E3A;
            --text-dark: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--maroon-deep) 0%, var(--maroon-rich) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- LOADING SCREEN --- */
        .intro-container {
            text-align: center;
            color: var(--cream-ivory);
            animation: fadeIn 1s ease-out;
        }

        .shuangxi-icon {
            font-size: 6rem;
            font-family: 'Playfair Display', serif;
            color: var(--gold-shimmer);
            margin-bottom: 40px;
            animation: scaleIn 1.5s ease-out, float 3s ease-in-out infinite 1.5s;
        }

        .intro-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        .couple-name-intro {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            line-height: 1.2;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.8s forwards;
        }

        .intro-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            opacity: 0;
            color: var(--gold-light);
            margin-top: 20px;
            animation: fadeInUp 1s ease-out 1.1s forwards;
        }

        /* --- OPEN BUTTON --- */
        .open-btn {
            margin-top: 60px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.5s forwards;
        }

        .open-btn a {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--gold-shimmer);
            color: var(--maroon-deep);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 2px solid var(--gold-shimmer);
            transition: all 0.3s ease;
        }

        .open-btn a:hover {
            background-color: transparent;
            color: var(--gold-shimmer);
            cursor: pointer;
        }

        /* --- DECORATIVE CORNERS (No Flowers) --- */
        .corner-line {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(201, 169, 98, 0.3);
        }
        .cl-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .cl-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .cl-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .cl-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- MOBILE --- */
        @media (max-width: 600px) {
            .shuangxi-icon { font-size: 4rem; }
            .couple-name-intro { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="intro-container">
        <!-- Decorative Corners -->
        <div class="corner-line cl-tl"></div>
        <div class="corner-line cl-tr"></div>
        <div class="corner-line cl-bl"></div>
        <div class="corner-line cl-br"></div>

        <!-- Animated Shuang Xi Symbol -->
        <div class="shuangxi-icon">囍</div>

        <!-- Intro Text -->
        <p class="intro-title">You're Invited</p>
        
        <h1 class="couple-name-intro">Regina<br>&<br>Raynald</h1>
        
        <p class="intro-date">July 19th, 2026</p>

        <!-- Button to Open Invitation -->
        <div class="open-btn">
            <a href="invitation.html">Open Invitation</a>
        </div>
    </div>

</body>
</html>
